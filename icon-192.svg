<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <clipPath id="c"><rect width="192" height="192" rx="43" ry="43"/></clipPath>
  </defs>
  <!-- fundo: camadas do hero hub -->
  <rect width="192" height="192" rx="43" fill="#04080f"/>
  <rect width="192" height="192" rx="43" fill="#0a1628" opacity="0.92"/>
  <!-- radial vermelho esq (rgba(139,26,26,0.25)) -->
  <ellipse cx="24" cy="108" rx="66" ry="66" fill="#8b1a1a" opacity="0.22" clip-path="url(#c)"/>
  <!-- radial ouro dir sup (rgba(201,168,76,0.12)) -->
  <ellipse cx="178" cy="32" rx="46" ry="46" fill="#c9a84c" opacity="0.12" clip-path="url(#c)"/>
  <!-- radial azul centro inf (rgba(17,34,64,0.8)) -->
  <ellipse cx="96" cy="178" rx="72" ry="50" fill="#112240" opacity="0.7" clip-path="url(#c)"/>

  <!-- estrelas -->
  <circle cx="32"  cy="22"  r="1.1" fill="white" opacity="0.75"/>
  <circle cx="70"  cy="14"  r="0.85" fill="white" opacity="0.55"/>
  <circle cx="110" cy="10"  r="0.7"  fill="white" opacity="0.45"/>
  <circle cx="136" cy="26"  r="1.3"  fill="white" opacity="0.85"/>
  <circle cx="172" cy="16"  r="0.8"  fill="white" opacity="0.60"/>
  <circle cx="164" cy="52"  r="0.7"  fill="white" opacity="0.42"/>
  <circle cx="22"  cy="60"  r="0.95" fill="white" opacity="0.58"/>
  <circle cx="180" cy="88"  r="0.6"  fill="white" opacity="0.40"/>
  <circle cx="14"  cy="132" r="0.7"  fill="white" opacity="0.38"/>
  <circle cx="168" cy="158" r="0.85" fill="white" opacity="0.42"/>
  <circle cx="52"  cy="172" r="0.6"  fill="white" opacity="0.35"/>
  <circle cx="88"  cy="18"  r="0.6"  fill="white" opacity="0.48"/>

  <!-- losango principal dourado -->
  <polygon points="96,16 176,96 96,176 16,96"
    fill="none" stroke="#c9a84c" stroke-width="3.2" opacity="0.95" stroke-linejoin="round"/>
  <!-- losango interno sutil -->
  <polygon points="96,46 134,96 96,146 58,96"
    fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.28"/>

  <!-- cruzamento de eixos levíssimo -->
  <line x1="16" y1="96"  x2="176" y2="96"  stroke="#c9a84c" stroke-width="0.7" opacity="0.16"/>
  <line x1="96" y1="16"  x2="96"  y2="176" stroke="#c9a84c" stroke-width="0.7" opacity="0.16"/>

  <!-- ESCHATON em duas linhas, centralizado no losango -->
  <text x="96" y="88"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="19.5"
    fill="#c9a84c" text-anchor="middle" letter-spacing="4">ESCHAT</text>
  <text x="96" y="112"
    font-family="Georgia,'Times New Roman',serif"
    font-weight="900" font-size="19.5"
    fill="#c9a84c" text-anchor="middle" letter-spacing="4">ON</text>

  <!-- divisor fino -->
  <line x1="42" y1="123" x2="150" y2="123" stroke="#c9a84c" stroke-width="0.8" opacity="0.50"/>

  <!-- subtítulo -->
  <text x="96" y="139"
    font-family="'Arial Narrow',Arial,Helvetica,sans-serif"
    font-weight="700" font-size="9"
    fill="#e8d5a0" text-anchor="middle" letter-spacing="2.5" opacity="0.72">EBD · 13 LIÇÕES</text>

